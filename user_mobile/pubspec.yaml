name: jneattendance_mobile
description: "JNE Attendance Mobile App"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.10.5+9
  permission_handler: ^11.3.1
  provider: ^6.1.2
  firebase_core: ^2.30.0
  cloud_firestore: ^4.17.0
